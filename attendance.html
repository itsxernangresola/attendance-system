<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Attendance</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        background: #f8f9fa;
        margin: 0;
        padding: 20px;
        font-size: 16px;
        line-height: 1.4;
    }

    .container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    h1 {
        background: #1a1a1a;
        color: white;
        margin: 0;
        padding: 24px;
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    #reader {
        width: 100%;
        height: 280px;
        display: block;
    }

    .live-display {
        padding: 28px;
        background: #f8f9fa;
        border-top: 2px solid #e9ecef;
    }

    .display-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px 24px;
        align-items: end;
    }

    .field {
        margin-bottom: 4px;
    }

    .label {
        font-size: 13px;
        font-weight: 500;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }

    .value {
        font-size: 18px;
        font-weight: 600;
        color: #212529;
        min-height: 24px;
        padding: 4px 0;
    }

    .value.empty {
        color: #adb5bd;
        font-style: italic;
    }

    .scan-number {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        color: #495057;
        margin-bottom: 8px;
    }

    .status {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 16px;
        font-weight: 600;
        padding: 12px 0;
        margin-top: 8px;
    }

    .status.success { color: #28a745; }
    .status.error { color: #dc3545; }

    .value.active {
        animation: pulse 0.6s ease-out;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }

    .controls {
        padding: 24px;
        display: flex;
        gap: 12px;
        background: #f8f9fa;
        border-top: 1px solid #e9ecef;
    }

    button {
        flex: 1;
        padding: 14px;
        border: 1px solid #dee2e6;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: all 0.2s;
    }

    button:hover {
        border-color: #1a1a1a;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn-clear {
        color: #dc3545;
        border-color: #dc3545;
    }

    .btn-clear:hover {
        background: #dc3545;
        color: white;
    }

    .stats {
        padding: 18px 24px;
        background: #1a1a1a;
        color: white;
        text-align: center;
        font-size: 17px;
        font-weight: 600;
    }

    .table-container {
        max-height: 360px;
        overflow-y: auto;
        background: white;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    th {
        background: #f8f9fa;
        font-weight: 600;
        color: #495057;
        padding: 16px 12px;
        text-align: left;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 2px solid #e9ecef;
    }

    td {
        padding: 14px 12px;
        border-bottom: 1px solid #f1f3f4;
    }

    tr:hover td {
        background: #f8f9fa;
    }

    @media (max-width: 500px) {
        body { padding: 12px; }
        .container { border-radius: 0; box-shadow: none; margin: 0; }
        .display-grid { grid-template-columns: 1fr; gap: 12px; }
        .scan-number { font-size: 20px; }
        .controls { flex-direction: column; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>QR Scanner</h1>
    
    <div id="reader"></div>
    
    <div class="live-display">
        <div class="display-grid" id="displayGrid">
            <div class="scan-number empty" id="scanNumber">-</div>
            
            <div>
                <div class="label">Name</div>
                <div class="value empty" id="studentName">-</div>
            </div>
            <div>
                <div class="label">Strand</div>
                <div class="value empty" id="studentStrand">-</div>
            </div>
            
            <div>
                <div class="label">Year</div>
                <div class="value empty" id="studentYear">-</div>
            </div>
            <div>
                <div class="label">Time</div>
                <div class="value empty" id="scanTime">-</div>
            </div>
            
            <div class="status" id="statusMsg">Ready to scan</div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="exportCSV()">Export CSV</button>
        <button class="btn-clear" onclick="clearData()">Clear All</button>
    </div>
    
    <div class="stats">
        Total: <span id="total">0</span>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Strand</th>
                    <th>Year</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    let attendanceList = [];
    let scannedIDs = new Set();
    let nextNumber = 1;
    let scanTimeout;

    function resetDisplay() {
        document.getElementById('scanNumber').textContent = '-';
        document.getElementById('scanNumber').className = 'scan-number empty';
        
        ['studentName', 'studentStrand', 'studentYear', 'scanTime'].forEach(id => {
            const el = document.getElementById(id);
            el.textContent = '-';
            el.className = 'value empty';
        });
        
        document.getElementById('statusMsg').textContent = 'Ready to scan';
        document.getElementById('statusMsg').className = 'status';
    }

    function showScan(decodedText) {
        if (scanTimeout) clearTimeout(scanTimeout);

        const parts = decodedText.split(';');
        if (parts.length < 8) {
            document.getElementById('statusMsg').textContent = 'Invalid QR';
            document.getElementById('statusMsg').className = 'status error';
            scanTimeout = setTimeout(resetDisplay, 1500);
            return;
        }

        const [, lastName, firstName, middleName, idNumber, , strand, year] = parts;
        
        if (scannedIDs.has(idNumber)) {
            document.getElementById('statusMsg').textContent = 'Already scanned';
            document.getElementById('statusMsg').className = 'status error';
            scanTimeout = setTimeout(resetDisplay, 1500);
            return;
        }

        const middleInitial = middleName ? middleName[0] + '.' : '';
        const fullName = `${lastName}, ${firstName} ${middleInitial}`;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});

        // Fill display
        document.getElementById('scanNumber').textContent = nextNumber;
        document.getElementById('scanNumber').className = 'scan-number';
        
        document.getElementById('studentName').textContent = fullName;
        document.getElementById('studentName').className = 'value active';
        
        document.getElementById('studentStrand').textContent = strand;
        document.getElementById('studentStrand').className = 'value';
        
        document.getElementById('studentYear').textContent = year;
        document.getElementById('studentYear').className = 'value';
        
        document.getElementById('scanTime').textContent = time;
        document.getElementById('scanTime').className = 'value';
        
        document.getElementById('statusMsg').textContent = '✓ Scan confirmed';
        document.getElementById('statusMsg').className = 'status success';
    }

    function onScanSuccess(decodedText) {
        showScan(decodedText);
        setTimeout(() => processScan(decodedText), 3000);
    }

    function processScan(decodedText) {
        const parts = decodedText.split(';');
        if (parts.length < 8) return;

        const [, lastName, firstName, middleName, idNumber, , strand, year] = parts;
        
        if (scannedIDs.has(idNumber)) return;

        const middleInitial = middleName ? middleName[0] + '.' : '';
        const fullName = `${lastName}, ${firstName} ${middleInitial}`;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});

        const record = { fullName, strand, year, idNumber, time };
        attendanceList.push(record);
        scannedIDs.add(idNumber);
        nextNumber++;

        addRow(record);
        document.getElementById('total').textContent = attendanceList.length;

        if (navigator.vibrate) navigator.vibrate(80);
        resetDisplay();
    }

    function addRow(record) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${attendanceList.length}</td>
            <td>${record.fullName}</td>
            <td>${record.strand}</td>
            <td>${record.year}</td>
            <td>${record.time}</td>
        `;
    }

    function clearData() {
        if (confirm('Clear all data?')) {
            attendanceList = [];
            scannedIDs.clear();
            nextNumber = 1;
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('total').textContent = '0';
            resetDisplay();
        }
    }

    function exportCSV() {
        if (!attendanceList.length) {
            alert('No data');
            return;
        }

        const csv = ['#,"Name","Strand","Year","Time']
            .concat(attendanceList.map((r, i) => 
                [i + 1, `"${r.fullName.replace(/"/g, '""')}"`, `"${r.strand}"`, `"${r.year}"`, `"${r.time}"`].join(',')
            )).join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    new Html5QrcodeScanner('reader', {
        fps: 10,
        qrbox: { width: 200, height: 200 }
    }).render(onScanSuccess);

    resetDisplay();
</script>

</body>
</html>
